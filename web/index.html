<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Nyingmapa Tibetan Buddhist Calendar — auspicious days, astrology, and practice reminders.">
  <meta name="theme-color" content="#1a1205">

  <!-- Performance: tell browser to pre-connect to Cloudflare CDN before first request -->
  <link rel="preconnect" href="https://ittle-term-2262.phungducmanh18072005.workers.dev">
  <link rel="dns-prefetch" href="https://ittle-term-2262.phungducmanh18072005.workers.dev">
  <!-- Preload manifest JSON so data sync starts as soon as possible -->
  <link rel="preload" href="https://ittle-term-2262.phungducmanh18072005.workers.dev/data/manifest.json"
        as="fetch" crossorigin="anonymous">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Nyingmapa Calendar">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Nyingmapa Calendar</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!-- Service worker: caches all B2 CDN requests for 30 days (saves bandwidth) -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(function(e) {
        console.warn('SW registration failed:', e);
      });
    }
  </script>
  <!-- flutter_bootstrap.js sets renderer:"html" -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
