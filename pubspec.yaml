name: nyingmapa_calendar_real
description: "Nyingmapa Tibetan Buddhist Calendar App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.7

  # Fonts
  google_fonts: ^6.2.1

  # Date formatting
  intl: ^0.19.0

  # Local storage
  shared_preferences: ^2.3.2

  # Location services
  geolocator: ^13.0.2
  # geocoding package removed — city name fetched via OSM Nominatim API directly
  # (geocoding package uses Android Geocoder / iOS CLGeocoder which fail silently
  #  on many devices without Google Play Services)

  # HTTP client for server sync + remote data
  http: ^1.2.1

  # Disk cache directory (for JSON + images)
  path_provider: ^2.1.3

  # Lazy network image loading with memory + disk cache
  cached_network_image: ^3.3.1

  # Local push notifications (Android + iOS; graceful no-op on web)
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  # flutter_timezone removed — timezone derived from DateTime.now().timeZoneOffset

  # Open URLs (social links, email, app store)
  url_launcher: ^6.3.1

  # Share sheet
  share_plus: ^10.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
